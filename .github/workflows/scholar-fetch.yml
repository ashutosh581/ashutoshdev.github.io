name: Fetch Google Scholar Publications

# Runs every Monday at 02:00 UTC and can be triggered manually.
on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "scholarly>=1.7" httpx

      - name: Fetch publications from Google Scholar
        run: python scripts/fetch_scholar.py

      - name: Commit updated publications.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.json
          git diff --cached --quiet || git commit -m "chore: update publications.json from Google Scholar [skip ci]"
          git push
